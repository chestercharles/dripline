name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Type check & lint
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 TypeScript
        run: npx tsc --noEmit

      - name: 🔍 Lint
        run: npx expo lint

  native-check:
    name: Native changes gate
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔍 Check native changes require version bump
        run: node native-changes-check.js --range "HEAD^...HEAD"
